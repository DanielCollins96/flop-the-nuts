<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIDI Note Hero</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="stage-panel">
        <header class="topbar">
          <div>
            <h1>MIDI Note Hero</h1>
            <p id="midiStatus">Connect a MIDI keyboard to begin.</p>
          </div>
          <div class="scoreboard" aria-label="Scoreboard">
            <div>
              <span>Score</span>
              <strong id="score">0</strong>
            </div>
            <div>
              <span>Streak</span>
              <strong id="streak">0</strong>
            </div>
            <div>
              <span>Accuracy</span>
              <strong id="accuracy">--</strong>
            </div>
          </div>
        </header>

        <div class="stage-wrap">
          <canvas id="gameCanvas" width="1280" height="720" aria-label="Falling MIDI note game"></canvas>
          <div class="permission-overlay" id="permissionOverlay">
            <h2>Use Chrome or Edge on localhost</h2>
            <p>Web MIDI needs browser permission. Plug in your Keystation, then connect.</p>
            <button id="connectButton" type="button">Connect MIDI</button>
          </div>
        </div>

        <div class="controls">
          <button id="startButton" type="button" disabled>Start Round</button>
          <button id="stopButton" type="button" disabled>Stop</button>
          <button id="panicButton" type="button">Clear Notes</button>
          <label>
            Mode
            <select id="difficultySelect">
              <option value="easy" selected>Easy 60-72</option>
              <option value="middle">Middle 48-72</option>
              <option value="full">Full custom</option>
            </select>
          </label>
          <label class="check-control">
            <input id="whiteKeysOnly" type="checkbox" />
            White keys only
          </label>
          <label>
            MIDI input
            <select id="inputSelect" disabled>
              <option>No MIDI inputs</option>
            </select>
          </label>
          <label>
            Low note
            <input id="lowNote" type="number" min="0" max="127" value="36" />
          </label>
          <label>
            High note
            <input id="highNote" type="number" min="0" max="127" value="84" />
          </label>
          <label>
            Speed
            <input id="speed" type="range" min="160" max="520" value="310" />
          </label>
          <label>
            Volume
            <input id="volume" type="range" min="0" max="100" value="55" />
          </label>
          <label class="file-control">
            Song
            <input id="midiFileInput" type="file" accept=".mid,.midi,.mp3,audio/midi,audio/mpeg,audio/*" />
          </label>
        </div>
      </section>

      <aside class="side-panel">
        <section>
          <h2>Live notes</h2>
          <div id="activeNotes" class="active-notes" aria-live="polite"></div>
        </section>
        <section>
          <h2>Device log</h2>
          <ol id="eventLog" class="event-log"></ol>
        </section>
      </aside>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
